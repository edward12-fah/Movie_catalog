<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CineX</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #000; color: #fff; height: 100vh; overflow: hidden; position: relative; }
        
        /* Background Gambar Film Redup */
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.8) 100%); z-index: 2; }
        
        .logo { position: absolute; top: 20px; left: 40px; font-size: 36px; font-weight: 900; color: #E50914; margin: 0; z-index: 10; letter-spacing: 2px; text-decoration: none; }
        
        .login-wrapper { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background-color: rgba(0, 0, 0, 0.75); padding: 60px 68px 40px; border-radius: 4px; width: 100%; max-width: 320px; box-sizing: content-box; }
        
        h2 { margin: 0 0 10px 0; font-size: 32px; font-weight: 700; }
        .sub-text { margin: 0 0 28px 0; color: #b3b3b3; font-size: 14px; line-height: 1.5; }
        
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 16px 20px; border-radius: 4px; border: none; background: #333; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.2s; }
        .input-group input:focus { background: #444; }
        
        .btn-submit { width: 100%; padding: 16px; background-color: #E50914; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background-color: #c10711; }
        
        .form-footer { margin-top: 30px; text-align: center; }
        .form-footer a { color: #b3b3b3; text-decoration: none; font-size: 15px; transition: 0.2s; }
        .form-footer a:hover { color: #fff; text-decoration: underline; }
        
        .error-msg { color: #e87c03; font-size: 14px; margin-top: 10px; background: rgba(232, 124, 3, 0.1); padding: 10px; border-left: 3px solid #e87c03; display: none; margin-bottom: 20px; }
        .success-msg { color: #28a745; font-size: 14px; margin-top: 10px; background: rgba(40, 167, 69, 0.1); padding: 10px; border-left: 3px solid #28a745; display: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop" class="bg-image" alt="Background">
    <div class="overlay"></div>

    <a href="index.html" class="logo">CineX</a>

    <div class="login-wrapper">
        <div class="login-box">
            <h2>Reset Password</h2>
            <p class="sub-text">Enter your registered email address to create a new password.</p>
            
            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <div class="input-group">
                <input type="email" id="reset-email" placeholder="Registered Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="reset-new-password" placeholder="New Password (min. 6 characters)" required>
            </div>
            <div class="input-group">
                <input type="password" id="reset-confirm-password" placeholder="Confirm New Password" required>
            </div>
            
            <button class="btn-submit" id="btn-reset" onclick="handleReset()">Update Password</button>
            
            <div class="form-footer">
                <a href="login.html">← Back to Sign In</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '../api/';

        async function handleReset() {
            const email = document.getElementById('reset-email').value;
            const newPassword = document.getElementById('reset-new-password').value;
            const confirmPassword = document.getElementById('reset-confirm-password').value;
            
            const errorBox = document.getElementById('error-msg');
            const successBox = document.getElementById('success-msg');
            const btn = document.getElementById('btn-reset');

            // Reset pesan
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            if (!email || !newPassword || !confirmPassword) {
                errorBox.style.display = 'block';
                errorBox.innerText = "Please fill in all fields.";
                return;
            }

            if (newPassword !== confirmPassword) {
                errorBox.style.display = 'block';
                errorBox.innerText = "New password and confirm password do not match.";
                return;
            }

            if (newPassword.length < 6) {
                errorBox.style.display = 'block';
                errorBox.innerText = "Password must be at least 6 characters long.";
                return;
            }

            btn.innerText = "Updating...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}forgot_password.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const result = await res.json();

                if (result.success) {
                    successBox.style.display = 'block';
                    successBox.innerText = result.message;
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000); // Redirect ke halaman login setelah 2 detik
                } else {
                    errorBox.style.display = 'block';
                    errorBox.innerText = result.message;
                    btn.innerText = "Update Password";
                    btn.disabled = false;
                }
            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.innerText = "Failed to connect to the server.";
                btn.innerText = "Update Password";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
