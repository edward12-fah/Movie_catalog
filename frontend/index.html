<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineX - Home</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0c; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .navbar h1 { color: #E50914; margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 1.5px; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #ccc; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 15px; }
        .nav-links a:hover, .nav-links a.active { color: #E50914; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .search-box { padding: 8px 15px; border-radius: 20px; border: 1px solid #444; background-color: #222; color: white; outline: none; width: 220px; transition: 0.3s; font-size: 14px; }
        .search-box:focus { border-color: #E50914; width: 260px; }
        .btn-logout { background: transparent; color: white; border: 1px solid #555; padding: 6px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background: #E50914; border-color: #E50914; }
        
        /* Hero Slider */
        .hero-container { position: relative; width: 100%; height: 80vh; min-height: 500px; overflow: hidden; background-color: #111; margin-top: 0; }
        .hero-slider { display: flex; width: 100%; height: 100%; transition: transform 0.6s ease-in-out; }
        .hero-slide { min-width: 100%; height: 100%; position: relative; background-size: cover; background-position: center top; display: flex; align-items: center; }
        .hero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to right, rgba(13,13,12,1) 0%, rgba(13,13,12,0.6) 50%, rgba(13,13,12,0) 100%), linear-gradient(to top, rgba(13,13,12,1) 0%, transparent 20%); }
        .hero-content { position: relative; z-index: 10; max-width: 600px; padding: 0 50px; margin-top: 50px; }
        .badge-type { background: #E50914; color: white; padding: 4px 8px; font-size: 12px; font-weight: bold; border-radius: 3px; display: inline-block; margin-bottom: 15px; }
        .hero-title { font-size: 55px; font-weight: 900; margin: 0 0 15px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); line-height: 1.1; font-family: Impact, sans-serif; letter-spacing: 1px; }
        .hero-meta { font-size: 15px; color: #ddd; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; font-weight: 600; }
        .hero-rating { color: #f5c518; }
        .hero-desc { font-size: 16px; line-height: 1.6; color: #ccc; margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .btn-play { background: #E50914; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-play:hover { background: #f40612; transform: scale(1.05); }

        .slider-controls { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); z-index: 20; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
        .slider-btn { background: rgba(0,0,0,0.5); color: white; border: none; font-size: 24px; cursor: pointer; width: 50px; height: 50px; border-radius: 50%; pointer-events: auto; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .slider-btn:hover { background: #E50914; transform: scale(1.1); }
        .slider-dots { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 20; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; }
        .dot.active { background: #E50914; transform: scale(1.3); }

        /* Grid Framework */
        .container { padding: 30px 50px; position: relative; z-index: 10; margin-bottom: 30px; }
        .section-title { font-size: 24px; font-weight: bold; margin-bottom: 25px; border-left: 4px solid #E50914; padding-left: 10px; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .trending-grid { grid-template-columns: repeat(5, 1fr); } /* Khusus Trending dipaksa 5 kolom */
        
        .movie-card { position: relative; border-radius: 8px; overflow: hidden; cursor: pointer; aspect-ratio: 2/3; background-color: #1a1a1a; transition: transform 0.3s; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info-hover { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 15px 15px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.8) 50%, transparent 100%); opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; }
        .movie-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 5; }
        .movie-card:hover .movie-info-hover { opacity: 1; }
        .hover-title { font-size: 16px; font-weight: bold; margin: 0 0 5px 0; }
        .hover-rating { color: #f5c518; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .hover-desc { font-size: 12px; color: #ccc; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        /* Pagination Controls */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 40px; margin-bottom: 50px; }
        .btn-page { background: #222; color: white; border: 1px solid #444; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .btn-page:hover:not(:disabled) { background: #E50914; border-color: #E50914; }
        .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <h1 onclick="window.location.href='index.html'">CineX</h1>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="genres.html">Genres</a>
                <a href="year.html">Year</a>
                <a href="actors.html">Actors</a>
            </div>
        </div>
        <div class="nav-right">
            <input type="text" class="search-box" id="search-input" placeholder="Cari film..." onkeypress="handleSearch(event)">
            <span id="user-greeting" style="font-size: 14px; font-weight: 600; color: #ccc;"></span>
            <button class="btn-logout" onclick="logout()">Keluar</button>
        </div>
    </div>

    <div class="hero-container" id="hero-container" style="display: none;">
        <div class="hero-slider" id="hero-slider"></div>
        <div class="slider-controls">
            <button class="slider-btn" onclick="prevSlide()">❮</button>
            <button class="slider-btn" onclick="nextSlide()">❯</button>
        </div>
        <div class="slider-dots" id="slider-dots"></div>
    </div>

    <div class="container" style="margin-bottom: 0;">
        <div class="section-title">Trending Now</div>
        <div class="movie-grid trending-grid" id="trending-list">Memuat film...</div>
    </div>

    <div class="container">
        <div class="section-title">Semua Film</div>
        <div class="movie-grid" id="all-movies-list">Memuat data...</div>
        
        <div class="pagination" id="pagination-controls" style="display: none;">
            <button class="btn-page" id="btn-prev" onclick="changePage(-1)">« Sebelumnya</button>
            <span id="page-info" style="font-weight: bold; color: #aaa;">Halaman 1</span>
            <button class="btn-page" id="btn-next" onclick="changePage(1)">Selanjutnya »</button>
        </div>
    </div>

    <script>
        const API_URL = '../api/movies.php';
        const token = localStorage.getItem('jwt_token');
        if (!token) window.location.href = 'login.html';
        document.getElementById('user-greeting').innerText = `Hi, ${localStorage.getItem('name')}`;

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = document.getElementById('search-input').value;
                if(query) window.location.href = `search.html?q=${query}`;
            }
        }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        // Variabel Slider
        let currentSlide = 0;
        let slideCount = 0;
        let slideInterval;

        // Variabel Pagination All Movies
        let currentPage = 1;
        const limitPerPage = 10;
        let totalPages = 1;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- BAGIAN 1: LOAD TRENDING & SLIDER ---
        async function loadTopMovies() {
            try {
                // Ambil 15 film dengan RATING TERTINGGI dari API
                const res = await fetch(`${API_URL}?limit=15&sort=rating`, { headers: { 'Authorization': 'Bearer ' + token } });
                const result = await res.json();

                if (result.success && result.data.length > 0) {
                    const topMovies = result.data;

                    // A. TRENDING NOW: Ambil mutlak top 5 rating tertinggi
                    const trendingMovies = topMovies.slice(0, 5);
                    const trendingContainer = document.getElementById('trending-list');
                    trendingContainer.innerHTML = '';
                    
                    trendingMovies.forEach(movie => {
                        let p = movie.poster_url || `https://via.placeholder.com/300x450/222222/555555?text=${encodeURI(movie.title)}`;
                        let rating = movie.rating ? parseFloat(movie.rating).toFixed(1) : 'N/A';
                        
                        trendingContainer.innerHTML += `
                            <div class="movie-card" onclick="window.location.href='detail.html?id=${movie.id}'">
                                <img src="${p}" alt="${movie.title}">
                                <div class="movie-info-hover">
                                    <h3 class="hover-title">${movie.title}</h3>
                                    <div class="hover-rating">★ ${rating} Rating</div>
                                    <div class="hover-desc">${movie.description || 'Tidak ada deskripsi.'}</div>
                                </div>
                            </div>
                        `;
                    });

                    // B. HERO SLIDER: Ambil sisa 10 film top, acak, lalu ambil 5 untuk ditampilkan
                    let sliderPool = shuffleArray(topMovies.slice(5, 15));
                    let sliderMovies = sliderPool.slice(0, 5);
                    slideCount = sliderMovies.length;
                    
                    document.getElementById('hero-container').style.display = 'block';
                    const sliderDiv = document.getElementById('hero-slider');
                    const dotsDiv = document.getElementById('slider-dots');
                    sliderDiv.innerHTML = ''; dotsDiv.innerHTML = '';

                    sliderMovies.forEach((movie, index) => {
                        let heroImage = movie.poster_url || `https://via.placeholder.com/1200x600/222222/555555?text=${encodeURI(movie.title)}`;
                        let rating = movie.rating ? parseFloat(movie.rating).toFixed(1) : 'N/A';
                        
                        sliderDiv.innerHTML += `
                            <div class="hero-slide" style="background-image: url('${heroImage}')">
                                <div class="hero-overlay"></div>
                                <div class="hero-content">
                                    <div class="badge-type">TOP RATED</div>
                                    <h1 class="hero-title">${movie.title}</h1>
                                    <div class="hero-meta">
                                        <span class="hero-rating">★ ${rating}</span>
                                        <span>${movie.release_year}</span> •
                                        <span>${movie.jenis_genre || 'Umum'}</span>
                                    </div>
                                    <p class="hero-desc">${movie.description || 'Tidak ada deskripsi.'}</p>
                                    <button class="btn-play" onclick="window.location.href='detail.html?id=${movie.id}'">▷ See Details</button>
                                </div>
                            </div>
                        `;
                        dotsDiv.innerHTML += `<div class="dot ${index === 0 ? 'active' : ''}" onclick="goToSlide(${index})"></div>`;
                    });
                    startSlideShow();
                }
            } catch (err) { console.error("Error Top Movies:", err); }
        }

        // --- BAGIAN 2: LOAD SEMUA FILM (PAGINATION) ---
        async function loadAllMovies() {
            try {
                const res = await fetch(`${API_URL}?page=${currentPage}&limit=${limitPerPage}`, { headers: { 'Authorization': 'Bearer ' + token } });
                const result = await res.json();
                const container = document.getElementById('all-movies-list');
                container.innerHTML = '';

                if (result.success && result.data.length > 0) {
                    result.data.forEach(movie => {
                        let p = movie.poster_url || `https://via.placeholder.com/300x450/222222/555555?text=${encodeURI(movie.title)}`;
                        let rating = movie.rating ? parseFloat(movie.rating).toFixed(1) : 'N/A';
                        
                        container.innerHTML += `
                            <div class="movie-card" onclick="window.location.href='detail.html?id=${movie.id}'">
                                <img src="${p}" alt="${movie.title}">
                                <div class="movie-info-hover">
                                    <h3 class="hover-title">${movie.title}</h3>
                                    <div class="hover-rating">★ ${rating} Rating</div>
                                    <div class="hover-desc">${movie.description || 'Tidak ada deskripsi.'}</div>
                                </div>
                            </div>
                        `;
                    });

                    // Update UI Pagination
                    document.getElementById('pagination-controls').style.display = 'flex';
                    totalPages = result.pagination.total_pages;
                    document.getElementById('page-info').innerText = `Halaman ${currentPage} dari ${totalPages}`;
                    document.getElementById('btn-prev').disabled = (currentPage === 1);
                    document.getElementById('btn-next').disabled = (currentPage === totalPages);
                }
            } catch (err) { console.error("Error All Movies:", err); }
        }

        function changePage(direction) {
            let newPage = currentPage + direction;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadAllMovies();
                
                // Gulir halaman ke area "Semua Film" agar user nyaman
                document.getElementById('all-movies-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // --- KONTROL SLIDER ---
        function updateSliderPosition() {
            document.getElementById('hero-slider').style.transform = `translateX(-${currentSlide * 100}%)`;
            document.querySelectorAll('.dot').forEach((dot, idx) => dot.classList.toggle('active', idx === currentSlide));
        }
        function nextSlide() { currentSlide = (currentSlide + 1) % slideCount; updateSliderPosition(); resetInterval(); }
        function prevSlide() { currentSlide = (currentSlide - 1 + slideCount) % slideCount; updateSliderPosition(); resetInterval(); }
        function goToSlide(index) { currentSlide = index; updateSliderPosition(); resetInterval(); }
        function startSlideShow() { slideInterval = setInterval(nextSlide, 6000); }
        function resetInterval() { clearInterval(slideInterval); startSlideShow(); }

        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.navbar');
            nav.style.backgroundColor = window.scrollY > 50 ? 'rgba(17, 17, 17, 1)' : 'rgba(17, 17, 17, 0.8)';
        });

        // Inisialisasi Halaman
        loadTopMovies();
        loadAllMovies();
    </script>
</body>
</html>
