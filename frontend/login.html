<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CineX</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #000; color: #fff; height: 100vh; overflow: hidden; position: relative; }
        
        /* Background Gambar Film Redup */
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.8) 100%); z-index: 2; }
        
        /* Logo IDLIX di Kiri Atas */
        .logo { position: absolute; top: 20px; left: 40px; font-size: 36px; font-weight: 900; color: #E50914; margin: 0; z-index: 10; letter-spacing: 2px; }
        
        /* Kotak Form Login */
        .login-wrapper { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background-color: rgba(0, 0, 0, 0.75); padding: 60px 68px 40px; border-radius: 4px; width: 100%; max-width: 320px; box-sizing: content-box; }
        
        h2 { margin: 0 0 28px 0; font-size: 32px; font-weight: 700; }
        
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 16px 20px; border-radius: 4px; border: none; background: #333; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.2s; }
        .input-group input:focus { background: #444; }
        
        .btn-submit { width: 100%; padding: 16px; background-color: #E50914; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 24px; transition: 0.2s; }
        .btn-submit:hover { background-color: #c10711; }
        
        .forgot-link { display: block; text-align: center; margin-top: 15px; color: #b3b3b3; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .forgot-link:hover { color: #fff; text-decoration: underline; }

        .form-footer { margin-top: 40px; color: #737373; font-size: 16px; }
        .form-footer a { color: #fff; text-decoration: none; font-weight: 500; transition: 0.2s; }
        .form-footer a:hover { text-decoration: underline; }
        
        .error-msg { color: #e87c03; font-size: 14px; margin-top: 10px; background: rgba(232, 124, 3, 0.1); padding: 10px; border-left: 3px solid #e87c03; display: none; }
    </style>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop" class="bg-image" alt="Background">
    <div class="overlay"></div>

    <h1 class="logo">CineX</h1>

    <div class="login-wrapper">
        <div class="login-box">
            <h2>Sign In</h2>
            
            <div id="error-msg" class="error-msg"></div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email address" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            
            <button class="btn-submit" id="btn-login" onclick="login()">Sign In</button>
            
            <a href="forgot_password.html" class="forgot-link">Forgot Password?</a>
            
            <div class="form-footer">
                <p>New to CINEX? <a href="register.html">Sign up now.</a></p>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('jwt_token')) {
            window.location.href = 'index.html';
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');

            if(!email || !password) {
                errorBox.style.display = 'block';
                errorBox.innerText = "Please enter a valid email and password.";
                return;
            }

            btn.innerText = "Signing in...";
            btn.disabled = true;

            try {
                const res = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('jwt_token', result.token); 
                    localStorage.setItem('role', result.data.role);
                    localStorage.setItem('name', result.data.name);
                    
                    if (result.data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    errorBox.style.display = 'block';
                    errorBox.innerText = result.message || "Invalid credentials.";
                    btn.innerText = "Sign In";
                    btn.disabled = false;
                }
            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.innerText = "Gagal terhubung ke API Server.";
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        }

        document.addEventListener("keypress", function(event) {
            if (event.key === "Enter") login();
        });
    </script>
</body>
</html>
