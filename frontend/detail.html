<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Film</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d0d0c; color: #fff; margin: 0; padding: 0; }
        
        /* Navbar Terpadu */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: rgba(17, 17, 17, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .navbar h1 { color: #E50914; margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 1.5px; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #ccc; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 15px; }
        .nav-links a:hover, .nav-links a.active { color: #E50914; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .search-box { padding: 8px 15px; border-radius: 20px; border: 1px solid #444; background-color: #222; color: white; outline: none; width: 220px; transition: 0.3s; font-size: 14px; }
        .search-box:focus { border-color: #E50914; width: 260px; }
        .btn-logout { background: transparent; color: white; border: 1px solid #555; padding: 6px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background: #E50914; border-color: #E50914; }
        
        /* Jarak Container dari Navbar Fixed */
        .container { padding: 40px; max-width: 1200px; margin: 100px auto 0 auto; }
        
        /* Layout Hero Detail */
        .hero-section { display: flex; gap: 40px; margin-bottom: 50px; }
        .poster-img { width: 300px; height: 450px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8); object-fit: cover; }
        .info-section { flex: 1; }
        .movie-title { font-size: 42px; font-weight: 900; margin: 0 0 10px 0; }
        .movie-meta { font-size: 15px; color: #aaa; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
        .rating-badge { background: #f5c518; color: black; padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        .movie-desc { font-size: 16px; line-height: 1.6; color: #ddd; }

        /* Cast Section */
        .section-header { font-size: 22px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .cast-container { display: flex; gap: 25px; overflow-x: auto; padding-bottom: 15px; }
        .cast-item { display: flex; flex-direction: column; align-items: center; width: 100px; text-align: center; }
        .cast-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; background-color: #333; border: 2px solid #222; }
        .cast-name { font-size: 14px; font-weight: bold; line-height: 1.2; }
        .cast-role { font-size: 12px; color: #888; margin-top: 5px; }

        /* More Like This (Rekomendasi) */
        .more-like-this { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; }
        .rec-card { min-width: 180px; border-radius: 6px; overflow: hidden; cursor: pointer; transition: 0.3s; aspect-ratio: 2/3; background: #1a1a1a; }
        .rec-card:hover { transform: scale(1.05); filter: brightness(1.2); }
        .rec-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Comments Section */
        .comment-box { background: #1a1a1a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .login-prompt { text-align: center; color: #E50914; font-weight: bold; cursor: pointer; }
        .comment-form { display: none; flex-direction: column; gap: 10px; }
        .comment-form textarea { width: 100%; padding: 10px; border-radius: 5px; background: #222; color: white; border: 1px solid #444; resize: vertical; box-sizing: border-box; }
        .comment-form select, .comment-form button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; }
        .comment-form button { background: #E50914; color: white; cursor: pointer; }
        
        .review-list { margin-top: 20px; }
        .review-item { border-bottom: 1px solid #333; padding: 15px 0; }
        .r-header { font-size: 14px; color: #ccc; font-weight: bold; margin-bottom: 8px; }
        .r-score { color: #f5c518; font-weight: bold; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <h1 onclick="window.location.href='index.html'">CineX</h1>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="genres.html">Genres</a>
                <a href="year.html">Year</a>
                <a href="actors.html">Actors</a>
            </div>
        </div>
        <div class="nav-right">
            <input type="text" class="search-box" id="search-input" placeholder="Cari judul film..." onkeypress="handleSearch(event)">
            <span id="user-greeting" style="font-size: 14px; font-weight: 600; color: #ccc;"></span>
            <button class="btn-logout" onclick="logout()">Keluar</button>
        </div>
    </div>

    <div class="container">
        <button class="btn-back" onclick="history.back()" style="display: inline-flex; align-items: center; color: #aaa; background: none; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 20px; padding: 0;">← Kembali</button>
        <div class="hero-section">
            <img id="d-poster" class="poster-img" src="" alt="Poster">
            <div class="info-section">
                <h1 class="movie-title" id="d-title">Memuat...</h1>
                <div class="movie-meta">
                    <span class="rating-badge" id="d-rating">★ --</span>
                    <span id="d-year">--</span>
                    <span id="d-genre">--</span>
                </div>
                <p class="movie-desc" id="d-desc">Mohon tunggu sebentar...</p>
            </div>
        </div>

        <div class="section-header">Cast</div>
        <div class="cast-container" id="d-cast"></div>

        <div class="section-header" style="margin-top: 50px;">More Like This</div>
        <div class="more-like-this" id="d-similar"></div>

        <div class="section-header" style="margin-top: 50px;">Comments & Reviews</div>
        <div class="comment-box">
            <div id="login-prompt" class="login-prompt" onclick="window.location.href='login.html'">Sign in to post a comment</div>
            <div id="comment-form" class="comment-form">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <label>Beri Rating (1-10):</label>
                    <select id="input-score" style="padding: 8px; background: #222; color: white; border: 1px solid #444; border-radius: 4px; outline: none;">
                        <option value="10">10 - Masterpiece</option>
                        <option value="9">9 - Amazing</option>
                        <option value="8">8 - Great</option>
                        <option value="7">7 - Good</option>
                        <option value="6">6 - Fine</option>
                        <option value="5">5 - Average</option>
                        <option value="4">4 - Below Average</option>
                        <option value="3">3 - Bad</option>
                        <option value="2">2 - Terrible</option>
                        <option value="1">1 - Appalling</option>
                    </select>
                </div>
                <textarea id="input-review" rows="3" placeholder="Tulis pendapatmu tentang film ini..."></textarea>
                <button onclick="postReview()">Kirim Ulasan</button>
            </div>
        </div>
        <div class="review-list" id="d-reviews"></div>
    </div>

    <script>
        const API_URL = '../api/';
        const token = localStorage.getItem('jwt_token');
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        let currentGenre = "";

        if (!movieId) window.location.href = 'index.html';

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = document.getElementById('search-input').value;
                if(query) window.location.href = `search.html?q=${query}`;
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        const authHeaders = token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : {};

        if (token) {
            document.getElementById('login-prompt').style.display = 'none';
            document.getElementById('comment-form').style.display = 'flex';
            document.getElementById('user-greeting').innerText = `Hi, ${localStorage.getItem('name')}`;
        }
        async function hapusUlasanAdmin(reviewId) {
            if (confirm("Sebagai Admin, Anda yakin ingin menghapus ulasan pengguna ini?")) {
                try {
                    const res = await fetch(`${API_URL}ulasan.php`, {
                        method: 'DELETE',
                        headers: authHeaders,
                        body: JSON.stringify({ id: reviewId })
                    });
                    const result = await res.json();
                    if(result.success) { location.reload(); } else { alert(result.message); }
                } catch(e) { console.error(e); }
            }
        }
        async function fetchDetail() {
            try {
                // Info Dasar
                const resMovie = await fetch(`${API_URL}movies.php?id=${movieId}`, { headers: authHeaders });
                const dataMovie = await resMovie.json();
                
                if(dataMovie.success) {
                    const m = dataMovie.data;
                    document.getElementById('d-title').innerText = m.title;
                    document.getElementById('d-year').innerText = m.release_year;
                    document.getElementById('d-genre').innerText = m.jenis_genre || 'Umum';
                    document.getElementById('d-desc').innerText = m.description || 'Tidak ada deskripsi.';
                    document.getElementById('d-poster').src = m.poster_url || `https://via.placeholder.com/300x450/222222/555555?text=${encodeURI(m.title)}`;
                    currentGenre = m.jenis_genre; 
                }

                // Rating & Komentar
                const resReview = await fetch(`${API_URL}ulasan.php?movie_id=${movieId}&limit=50`, { headers: authHeaders });
                const dataReview = await resReview.json();
                const revContainer = document.getElementById('d-reviews');
                
                if(dataReview.success && dataReview.data.length > 0) {
                    let totalScore = 0;
dataReview.data.forEach(r => {
                        totalScore += parseInt(r.score);
                        const namaPengguna = r.user_name || `User #${r.user_id}`;
                        
                        // CEK APAKAH INI ADMIN? JIKA YA, TAMPILKAN TOMBOL HAPUS
                        let adminTools = '';
                        if (localStorage.getItem('role') === 'admin') {
                            adminTools = `<button onclick="hapusUlasanAdmin(${r.id})" style="background:red; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:12px; float:right;">Hapus Ulasan (Admin)</button>`;
                        }
                        
                        revContainer.innerHTML += `
                            <div class="review-item">
                                ${adminTools}
                                <div class="r-header">${namaPengguna} <span class="r-score">★ ${r.score}/10</span></div>
                                <div style="color: #eee; font-size: 14px; line-height: 1.5;">${r.review}</div>
                            </div>
                        `;
                    });                    
                    document.getElementById('d-rating').innerText = `★ ${(totalScore / dataReview.data.length).toFixed(1)}`;
                } else {
                    revContainer.innerHTML = '<p style="color:#666;">Belum ada ulasan. Jadilah yang pertama!</p>';
                }

                // Cast / Aktor
                const resCast = await fetch(`${API_URL}movie_actors.php?movie_id=${movieId}&limit=20`, { headers: authHeaders });
                const dataCast = await resCast.json();
                const castContainer = document.getElementById('d-cast');
                
                if(dataCast.success && dataCast.data.length > 0) {
                    dataCast.data.forEach(c => {
                        castContainer.innerHTML += `
                            <div class="cast-item" onclick="window.location.href='search.html?actor_id=${c.actor_id}&actor_name=${encodeURI(c.actor_name)}'" style="cursor: pointer;">
                                <img class="cast-img" src="https://ui-avatars.com/api/?name=${encodeURI(c.actor_name)}&background=random" alt="${c.actor_name}">
                                <div class="cast-name">${c.actor_name}</div>
                                <div class="cast-role">${c.character_name}</div>
                            </div>
                        `;
                    });
                } else { castContainer.innerHTML = '<p style="color:#666;">Data pemeran belum tersedia.</p>'; }

                // Rekomendasi
                const resSim = await fetch(`${API_URL}movies.php?limit=50`, { headers: authHeaders });
                const dataSim = await resSim.json();
                const simContainer = document.getElementById('d-similar');
                
                if(dataSim.success) {
                    const similarMovies = dataSim.data.filter(m => m.jenis_genre === currentGenre && m.id !== parseInt(movieId)).slice(0, 5);
                    if(similarMovies.length > 0) {
                        similarMovies.forEach(m => {
                            let p = m.poster_url || `https://via.placeholder.com/200x300/222222/555555?text=${encodeURI(m.title)}`;
                            simContainer.innerHTML += `
                                <div class="rec-card" onclick="window.location.href='detail.html?id=${m.id}'">
                                    <img src="${p}" alt="${m.title}">
                                </div>
                            `;
                        });
                    } else { simContainer.innerHTML = '<p style="color:#666;">Tidak ada film sejenis.</p>'; }
                }
            } catch (e) { console.error(e); }
        }

        async function postReview() {
            const score = document.getElementById('input-score').value;
            const review = document.getElementById('input-review').value;
            if(!review) return alert("Komentar tidak boleh kosong!");

            try {
                const res = await fetch(`${API_URL}ulasan.php`, {
                    method: 'POST', headers: authHeaders,
                    body: JSON.stringify({ movie_id: movieId, score: score, review: review })
                });
                const result = await res.json();
                if(result.success) { location.reload(); } 
                else { alert("Gagal: " + result.message); }
            } catch(e) { console.error(e); }
        }

        fetchDetail();
    </script>
</body>
</html>
